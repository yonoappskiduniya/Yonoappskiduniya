<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{
background:#FFD700;
color:#000;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:500px;
margin:30px auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.card h2{
margin-bottom:10px;
color:#FFD700;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:10px;
background:#FFD700;
color:#000;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffc107;
}
</style>

</head>
<body>

<header>
🎮 YonoAppsKiDuniya Admin Panel
</header>

<div class="container">

<div class="card">
<h2>Welcome Admin 👋</h2>
<p>Manage your website from here.</p>
</div>

<div class="card">

<button onclick="window.location.href='add-game.html'">
➕ Add Game
</button>

<button onclick="window.location.href='manage-games.html'">
🎮 Manage Games
</button>

<button onclick="window.location.href='users.html'">
👤 Users
</button>

<button onclick="window.location.href='wallet.html'">
💰 Wallet
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<script>
function logout(){
localStorage.clear();
window.location.href="admin-login.html";
}
</script>

</body>
</html>
